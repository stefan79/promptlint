name: Post-Merge Knowledge Extraction

on:
  pull_request:
    types: [closed]

permissions:
  contents: write
  pull-requests: read

jobs:
  extract:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.base.ref }}

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Extract knowledge from PR
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER=${{ github.event.pull_request.number }}
          PR_TITLE="${{ github.event.pull_request.title }}"
          PR_BODY=$(gh pr view $PR_NUMBER --json body -q '.body')
          DIFF=$(git diff ${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.merge_commit_sha }} -- '*.py' '*.md' '*.yaml' '*.yml' '*.toml')
          REVIEW_COMMENTS=$(gh api repos/${{ github.repository }}/pulls/$PR_NUMBER/comments --jq '.[].body' 2>/dev/null || echo "none")
          TODAY=$(date +%Y-%m-%d)

          ENTRY=$(claude -p "You are analyzing a merged pull request for the promptlint project.
          Your goal is to identify improvements to the project's skills, agents, CLAUDE.md, and rules
          (NOT the application code itself — that is handled by code review).

          The improvement backlog targets these files:
          - .claude/skills/*.md (skills that guide Claude's behavior)
          - .claude/agents/*.md (autonomous agent definitions)
          - CLAUDE.md (project instructions, architecture, coding standards)
          - .github/workflows/*.yml (CI/CD rules)
          - .claude/settings.local.json (hooks and rules)

          PR #$PR_NUMBER: $PR_TITLE

          PR Description:
          $PR_BODY

          Review Comments:
          $REVIEW_COMMENTS

          Diff:
          $DIFF

          Analyze the changes and output markdown entries for IMPROVEMENTS.md.
          For EACH finding, use this exact format:

          ### <short finding title>

          **Trigger:** What in this PR revealed the gap (e.g. 'code review found duplicated NLI logic
          across classifier.py and contradiction.py')

          **Current state:** How the relevant skill/agent/rule handles this today (quote the relevant
          section if possible)

          **Impacted files:**
          - <list each skill, agent, rule, or CLAUDE.md section affected>

          **Suggested fix:** Concrete change to make (e.g. 'Add to architect skill: extract shared
          NLI batch inference into a _nli_helpers.py module')

          Group findings under a PR header: ## PR #$PR_NUMBER — $PR_TITLE ($TODAY)

          Rules:
          - Only suggest improvements to skills, agents, CLAUDE.md, and rules — not code fixes
          - Only list findings NOT already addressed in this PR
          - Be concise. No busywork. Only genuine gaps." --model claude-opus-4-6 --output-format json 2>/dev/null | jq -r '.result // .message // "Extraction failed"')

          # Append to IMPROVEMENTS.md
          if [ ! -f IMPROVEMENTS.md ]; then
            echo "# Improvement Backlog" > IMPROVEMENTS.md
            echo "" >> IMPROVEMENTS.md
            echo "Auto-generated from merged PRs. Tracks improvements needed in skills, agents, CLAUDE.md, and rules." >> IMPROVEMENTS.md
            echo "" >> IMPROVEMENTS.md
          fi

          echo "" >> IMPROVEMENTS.md
          echo "$ENTRY" >> IMPROVEMENTS.md

          # Commit and push
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add IMPROVEMENTS.md
          git commit -m "Extract knowledge from PR #$PR_NUMBER" || echo "No changes to commit"
          git push
